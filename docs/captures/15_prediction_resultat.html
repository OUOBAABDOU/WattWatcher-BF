<h1>Prédiction de durée</h1>
<p class="lead">Estimez la durée probable d’une coupure à partir des caractéristiques connues.</p>



<form method="post" class="form-card">
  <h2>Scénario à tester</h2>
  <div class="form-grid">
    <input name="region" placeholder="Région" value="Centre" required>
    <input name="ville" placeholder="Ville" value="Ouagadougou" required>
    <input name="zone" placeholder="Zone" value="Tanghin" required>
    <select name="type_coupure">
      
      <option value="prévue" selected>prévue</option>
      
      <option value="imprévue" >imprévue</option>
      
      <option value="perturbation" >perturbation</option>
      
      <option value="travaux" >travaux</option>
      
    </select>
    <select name="model_variant">
      <option value="balanced" selected>Modèle balanced</option>
      <option value="standard" >Modèle standard</option>
    </select>
    <input name="mois" type="number" min="1" max="12" placeholder="Mois" value="3">
    <input name="heure_num" type="number" min="0" max="23" placeholder="Heure" value="8">
    <input name="jour_num" type="number" min="0" max="6" placeholder="Jour semaine 0-6" value="1">
    <input name="temperature_max" type="number" step="0.1" placeholder="Température max" value="38.0">
    <input name="precipitation" type="number" step="0.1" placeholder="Précipitation" value="0.0">
    <input name="irradiation_solaire" type="number" step="0.1" placeholder="Irradiation solaire" value="5.8">
  </div>
  <button type="submit">Prédire</button>
</form>



  </main>
</body>
