services:
  postgres:
    image: postgres:16
    container_name: wattwatcher_postgres
    environment:
      POSTGRES_DB: wattwatcher_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
volumes:
  postgres_data:
